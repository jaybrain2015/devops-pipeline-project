# ── PersistentVolumeClaim ────────────────────
# Requests storage from the cluster
# Like asking for a hard drive
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: devops-app
spec:
  accessModes:
    - ReadWriteOnce        # One node can read/write
  resources:
    requests:
      storage: 1Gi         # Request 1GB storage

---
# ── MySQL Deployment ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: devops-app
  labels:
    app: mysql
spec:
  replicas: 1              # Only 1 MySQL (databases don't scale like apps)
  selector:
    matchLabels:
      app: mysql           # Manage pods with this label
  template:
    metadata:
      labels:
        app: mysql         # This label connects Deployment → Pod → Service
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            # Pull from Secret
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-app-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: devops-app-secret
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: devops-app-secret
                  key: DB_PASS
            # Pull from ConfigMap
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: devops-app-config
                  key: DB_NAME
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - --socket=/var/lib/mysql/mysql.sock
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - --socket=/var/lib/mysql/mysql.sock
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---
# ── MySQL Service ────────────────────────────
# Gives MySQL a stable DNS name inside the cluster
# Pods find MySQL at "mysql-service:3306"
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: devops-app
  labels:
    app: mysql
spec:
  selector:
    app: mysql             # Route to pods with this label
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP          # Only accessible inside cluster
