services:
  nginx:
    image: nginx:alpine
    container_name: devops_nginx
    ports:
      - "9090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_app
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_VERSION=${APP_VERSION}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
        - devops-network
    restart: unless-stopped   
    volumes:
      - ./src:/var/www/html  
      
  mysql:
      image: mysql:8.0
      container_name: devops_mysql
      environment:
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        - MYSQL_DATABASE=${DB_NAME}
        - MYSQL_USER=${DB_USER}
        - MYSQL_PASSWORD=${DB_PASS}
      volumes:
        - mysql_data:/var/lib/mysql     
        - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      networks:
        - devops-network
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  mysql_data:               # MySQL data persists after container stops
    driver: local   

networks:
  devops-network:
    driver: bridge         